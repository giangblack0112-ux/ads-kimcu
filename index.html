<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🔥 Ninja Ads Checker - Naruto Style 🔥</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700&display=swap');

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Exo 2', sans-serif;
      background: 
        radial-gradient(circle at 20% 20%, rgba(255, 165, 0, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 30%, rgba(255, 69, 0, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 40% 70%, rgba(255, 140, 0, 0.06) 0%, transparent 50%),
        radial-gradient(circle at 90% 80%, rgba(255, 99, 71, 0.1) 0%, transparent 50%),
        linear-gradient(135deg, #1a1a2e 0%, #16213e 25%, #0f3460 50%, #533483 75%, #e94560 100%);
      background-attachment: fixed;
      color: #fff;
      margin: 0;
      padding: 60px 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* Chakra energy background */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 30% 20%, rgba(255, 165, 0, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 70% 80%, rgba(255, 69, 0, 0.12) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(255, 140, 0, 0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 1;
      animation: chakraPulse 4s ease-in-out infinite;
    }

    @keyframes chakraPulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.05); }
    }

    /* Floating kunai and shuriken */
    .ninja-weapon {
      position: fixed;
      width: 20px;
      height: 20px;
      background: linear-gradient(45deg, #ff6b35, #f7931e);
      border-radius: 50%;
      opacity: 0.8;
      animation: ninjaFloat 12s infinite linear;
      pointer-events: none;
      z-index: 1;
      box-shadow: 0 0 10px rgba(255, 107, 53, 0.5);
    }

    .ninja-weapon::before {
      content: '⚡';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 12px;
      color: #fff;
    }

    .ninja-weapon.kunai {
      width: 15px;
      height: 15px;
      background: linear-gradient(45deg, #ff4500, #ff8c00);
      border-radius: 50% 0 50% 0;
    }

    .ninja-weapon.shuriken {
      width: 18px;
      height: 18px;
      background: linear-gradient(45deg, #ff6347, #ffa500);
      border-radius: 0;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    }

    .ninja-weapon.chakra {
      width: 25px;
      height: 25px;
      background: radial-gradient(circle, rgba(255, 165, 0, 0.8), rgba(255, 69, 0, 0.6));
      border-radius: 50%;
      animation: chakraSpin 3s linear infinite;
    }

    @keyframes ninjaFloat {
      0% {
        transform: translateY(-100vh) translateX(0px) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 0.8;
      }
      25% {
        transform: translateY(-75vh) translateX(30px) rotate(90deg);
      }
      50% {
        transform: translateY(-50vh) translateX(-20px) rotate(180deg);
      }
      75% {
        transform: translateY(-25vh) translateX(25px) rotate(270deg);
      }
      90% {
        opacity: 0.8;
      }
      100% {
        transform: translateY(100vh) translateX(-10px) rotate(360deg);
        opacity: 0;
      }
    }

    @keyframes chakraSpin {
      0% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(180deg) scale(1.2); }
      100% { transform: rotate(360deg) scale(1); }
    }

    /* Wind effect for weapons */
    .ninja-weapon.wind-left {
      animation: ninjaFloatLeft 10s infinite linear;
    }

    .ninja-weapon.wind-right {
      animation: ninjaFloatRight 10s infinite linear;
    }

    @keyframes ninjaFloatLeft {
      0% {
        transform: translateY(-100vh) translateX(60px) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 0.8;
      }
      25% {
        transform: translateY(-75vh) translateX(90px) rotate(90deg);
      }
      50% {
        transform: translateY(-50vh) translateX(70px) rotate(180deg);
      }
      75% {
        transform: translateY(-25vh) translateX(80px) rotate(270deg);
      }
      90% {
        opacity: 0.8;
      }
      100% {
        transform: translateY(100vh) translateX(50px) rotate(360deg);
        opacity: 0;
      }
    }

    @keyframes ninjaFloatRight {
      0% {
        transform: translateY(-100vh) translateX(-60px) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 0.8;
      }
      25% {
        transform: translateY(-75vh) translateX(-90px) rotate(90deg);
      }
      50% {
        transform: translateY(-50vh) translateX(-70px) rotate(180deg);
      }
      75% {
        transform: translateY(-25vh) translateX(-80px) rotate(270deg);
      }
      90% {
        opacity: 0.8;
      }
      100% {
        transform: translateY(100vh) translateX(-50px) rotate(360deg);
        opacity: 0;
      }
    }

    .container {
      background: 
        linear-gradient(135deg, rgba(26, 26, 46, 0.95), rgba(22, 33, 62, 0.9)),
        radial-gradient(circle at 50% 50%, rgba(255, 165, 0, 0.1), transparent 70%);
      border: 3px solid rgba(255, 165, 0, 0.4);
      border-radius: 20px;
      box-shadow: 
        0 0 30px rgba(255, 165, 0, 0.3),
        0 0 60px rgba(255, 69, 0, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.1),
        inset 0 -1px 0 rgba(0, 0, 0, 0.2);
      padding: 40px 50px;
      max-width: 720px;
      width: 100%;
      backdrop-filter: blur(15px);
      transition: all 0.3s ease;
      position: relative;
      z-index: 2;
      animation: containerGlow 3s ease-in-out infinite;
    }

    @keyframes containerGlow {
      0%, 100% { 
        box-shadow: 
          0 0 30px rgba(255, 165, 0, 0.3),
          0 0 60px rgba(255, 69, 0, 0.2),
          inset 0 1px 0 rgba(255, 255, 255, 0.1),
          inset 0 -1px 0 rgba(0, 0, 0, 0.2);
      }
      50% { 
        box-shadow: 
          0 0 40px rgba(255, 165, 0, 0.5),
          0 0 80px rgba(255, 69, 0, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.2),
          inset 0 -1px 0 rgba(0, 0, 0, 0.2);
      }
    }

    .container::before {
      content: '🔥';
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 35px;
      background: linear-gradient(45deg, #ff6b35, #f7931e, #ff4500);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: ninjaPulse 2s ease-in-out infinite;
      text-shadow: 0 0 20px rgba(255, 107, 53, 0.5);
    }

    @keyframes ninjaPulse {
      0%, 100% { transform: translateX(-50%) scale(1) rotate(0deg); }
      25% { transform: translateX(-50%) scale(1.1) rotate(5deg); }
      50% { transform: translateX(-50%) scale(1.2) rotate(0deg); }
      75% { transform: translateX(-50%) scale(1.1) rotate(-5deg); }
    }

    h2 {
      text-align: center;
      background: linear-gradient(135deg, #ff6b35, #f7931e, #ff4500, #ff8c00);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 36px;
      margin-bottom: 30px;
      letter-spacing: 3px;
      font-family: 'Orbitron', monospace;
      font-weight: 800;
      text-shadow: 0 0 30px rgba(255, 107, 53, 0.5);
      position: relative;
      animation: titleGlow 2s ease-in-out infinite;
    }

    @keyframes titleGlow {
      0%, 100% { 
        text-shadow: 0 0 30px rgba(255, 107, 53, 0.5);
        transform: scale(1);
      }
      50% { 
        text-shadow: 0 0 50px rgba(255, 107, 53, 0.8);
        transform: scale(1.02);
      }
    }

    h2::before {
      content: '⚡';
      position: absolute;
      left: -50px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 28px;
      animation: lightningSpin 2s linear infinite;
      color: #ff6b35;
      text-shadow: 0 0 15px rgba(255, 107, 53, 0.8);
    }

    h2::after {
      content: '⚡';
      position: absolute;
      right: -50px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 28px;
      animation: lightningSpin 2s linear infinite reverse;
      color: #ff6b35;
      text-shadow: 0 0 15px rgba(255, 107, 53, 0.8);
    }

    @keyframes lightningSpin {
      0% { transform: translateY(-50%) rotate(0deg) scale(1); }
      25% { transform: translateY(-50%) rotate(90deg) scale(1.2); }
      50% { transform: translateY(-50%) rotate(180deg) scale(1); }
      75% { transform: translateY(-50%) rotate(270deg) scale(1.2); }
      100% { transform: translateY(-50%) rotate(360deg) scale(1); }
    }

    label {
      font-weight: 600;
      display: block;
      margin-bottom: 10px;
      color: #ffd700;
      font-size: 16px;
      position: relative;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
      animation: labelGlow 3s ease-in-out infinite;
    }

    @keyframes labelGlow {
      0%, 100% { text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
      50% { text-shadow: 0 0 20px rgba(255, 215, 0, 0.8); }
    }

    label::before {
      content: '⚔️';
      margin-right: 10px;
      font-size: 16px;
      animation: weaponBounce 2s ease-in-out infinite;
    }

    @keyframes weaponBounce {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-3px) rotate(10deg); }
    }

    input, textarea {
      width: 100%;
      padding: 16px 20px;
      border-radius: 12px;
      border: 2px solid rgba(255, 165, 0, 0.4);
      background: 
        linear-gradient(135deg, rgba(26, 26, 46, 0.9), rgba(22, 33, 62, 0.8)),
        radial-gradient(circle at 50% 50%, rgba(255, 165, 0, 0.05), transparent 70%);
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: all 0.3s ease;
      box-shadow: 
        inset 0 2px 4px rgba(0, 0, 0, 0.2),
        0 0 10px rgba(255, 165, 0, 0.1);
      font-family: 'Exo 2', sans-serif;
    }

    input:focus, textarea:focus {
      border-color: #ff6b35;
      background: 
        linear-gradient(135deg, rgba(26, 26, 46, 0.95), rgba(22, 33, 62, 0.9)),
        radial-gradient(circle at 50% 50%, rgba(255, 107, 53, 0.1), transparent 70%);
      box-shadow: 
        0 0 0 3px rgba(255, 107, 53, 0.3),
        inset 0 2px 4px rgba(0, 0, 0, 0.2),
        0 0 20px rgba(255, 107, 53, 0.2);
      transform: translateY(-2px);
      animation: inputFocus 0.5s ease-out;
    }

    @keyframes inputFocus {
      0% { transform: translateY(-2px) scale(1); }
      50% { transform: translateY(-2px) scale(1.02); }
      100% { transform: translateY(-2px) scale(1); }
    }

    textarea {
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 18px 0;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #ff6b35, #f7931e, #ff4500, #ff8c00);
      border: 2px solid rgba(255, 165, 0, 0.6);
      border-radius: 15px;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.3s ease;
      letter-spacing: 2px;
      position: relative;
      overflow: hidden;
      box-shadow: 
        0 6px 20px rgba(255, 107, 53, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
      font-family: 'Orbitron', monospace;
      text-transform: uppercase;
      animation: buttonPulse 2s ease-in-out infinite;
    }

    @keyframes buttonPulse {
      0%, 100% { 
        box-shadow: 
          0 6px 20px rgba(255, 107, 53, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.2);
      }
      50% { 
        box-shadow: 
          0 8px 30px rgba(255, 107, 53, 0.6),
          inset 0 1px 0 rgba(255, 255, 255, 0.3);
      }
    }

    button::before {
      content: '🔥';
      position: absolute;
      left: 25px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      animation: fireBounce 1.5s ease-in-out infinite;
    }

    button::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      transition: left 0.6s;
    }

    button:hover {
      background: linear-gradient(135deg, #ff4500, #ff6b35, #f7931e, #ff8c00);
      transform: translateY(-4px);
      box-shadow: 
        0 10px 35px rgba(255, 107, 53, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
      animation: buttonHover 0.5s ease-out;
    }

    @keyframes buttonHover {
      0% { transform: translateY(-4px) scale(1); }
      50% { transform: translateY(-4px) scale(1.05); }
      100% { transform: translateY(-4px) scale(1); }
    }

    button:hover::after {
      left: 100%;
    }

    button:active {
      transform: translateY(-2px) scale(0.98);
      animation: buttonActive 0.2s ease-out;
    }

    @keyframes buttonActive {
      0% { transform: translateY(-2px) scale(0.98); }
      50% { transform: translateY(-2px) scale(0.95); }
      100% { transform: translateY(-2px) scale(0.98); }
    }

    @keyframes fireBounce {
      0%, 100% { transform: translateY(-50%) rotate(0deg) scale(1); }
      25% { transform: translateY(-60%) rotate(5deg) scale(1.1); }
      50% { transform: translateY(-55%) rotate(0deg) scale(1.2); }
      75% { transform: translateY(-60%) rotate(-5deg) scale(1.1); }
    }

    .row {
      margin-bottom: 25px;
    }

    .note {
      font-size: 14px;
      color: #ffd700;
      margin-top: 8px;
      font-style: italic;
      opacity: 0.9;
      text-shadow: 0 0 5px rgba(255, 215, 0, 0.3);
    }

    .error {
      background: 
        linear-gradient(135deg, rgba(255, 69, 0, 0.2), rgba(255, 99, 71, 0.15)),
        radial-gradient(circle at 50% 50%, rgba(255, 69, 0, 0.1), transparent 70%);
      border: 2px solid rgba(255, 69, 0, 0.5);
      padding: 18px 22px;
      border-radius: 12px;
      color: #fff;
      white-space: pre-line;
      margin-top: 20px;
      box-shadow: 
        inset 0 2px 4px rgba(0, 0, 0, 0.2),
        0 0 15px rgba(255, 69, 0, 0.3);
      animation: errorPulse 2s ease-in-out infinite;
    }

    @keyframes errorPulse {
      0%, 100% { box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2), 0 0 15px rgba(255, 69, 0, 0.3); }
      50% { box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2), 0 0 25px rgba(255, 69, 0, 0.5); }
    }

    .status {
      display: block;
      text-align: center;
      color: #ffd700;
      margin-top: 20px;
      font-size: 18px;
      font-weight: 600;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
      animation: statusGlow 2s ease-in-out infinite;
    }

    @keyframes statusGlow {
      0%, 100% { text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
      50% { text-shadow: 0 0 20px rgba(255, 215, 0, 0.8); }
    }

    #results {
      margin-top: 40px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      background: 
        linear-gradient(135deg, rgba(26, 26, 46, 0.9), rgba(22, 33, 62, 0.8)),
        radial-gradient(circle at 50% 50%, rgba(255, 165, 0, 0.1), transparent 70%);
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 
        0 8px 30px rgba(255, 165, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 165, 0, 0.4);
      animation: tableGlow 3s ease-in-out infinite;
    }

    @keyframes tableGlow {
      0%, 100% { 
        box-shadow: 
          0 8px 30px rgba(255, 165, 0, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
      }
      50% { 
        box-shadow: 
          0 12px 40px rgba(255, 165, 0, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.2);
      }
    }

    th, td {
      padding: 18px 22px;
      text-align: left;
    }

    th {
      background: linear-gradient(135deg, #ff6b35, #f7931e, #ff4500);
      color: #fff;
      font-weight: 700;
      border-bottom: 3px solid rgba(255, 165, 0, 0.5);
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
      font-family: 'Orbitron', monospace;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    tr:nth-child(even) {
      background: rgba(255, 165, 0, 0.05);
    }

    tr:hover {
      background: 
        linear-gradient(135deg, rgba(255, 107, 53, 0.2), rgba(255, 165, 0, 0.1));
      transform: scale(1.02);
      transition: all 0.3s ease;
      box-shadow: 0 0 15px rgba(255, 107, 53, 0.3);
    }

    td {
      border-bottom: 1px solid rgba(255, 165, 0, 0.2);
      color: #fff;
      font-weight: 600;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
    }

  </style>
</head>

  <script>
  // Ninja weapons animation
  function createNinjaWeapons() {
    const weaponCount = 30; // Số lượng vũ khí ninja
    const weaponTypes = ['', 'kunai', 'shuriken', 'chakra'];
    const windEffects = ['', 'wind-left', 'wind-right'];
    
    for (let i = 0; i < weaponCount; i++) {
      setTimeout(() => {
        const weapon = document.createElement('div');
        const randomType = weaponTypes[Math.floor(Math.random() * weaponTypes.length)];
        const randomWind = windEffects[Math.floor(Math.random() * windEffects.length)];
        weapon.className = `ninja-weapon ${randomType} ${randomWind}`;
        weapon.style.left = Math.random() * 100 + '%';
        weapon.style.animationDelay = Math.random() * 4 + 's';
        weapon.style.animationDuration = (Math.random() * 8 + 8) + 's';
        document.body.appendChild(weapon);
        
        // Remove weapon after animation
        setTimeout(() => {
          if (weapon.parentNode) {
            weapon.parentNode.removeChild(weapon);
          }
        }, 16000);
      }, i * 150);
    }
  }

  // Function to create single random weapon
  function createRandomWeapon() {
    const weapon = document.createElement('div');
    const weaponTypes = ['', 'kunai', 'shuriken', 'chakra'];
    const windEffects = ['', 'wind-left', 'wind-right'];
    const randomType = weaponTypes[Math.floor(Math.random() * weaponTypes.length)];
    const randomWind = windEffects[Math.floor(Math.random() * windEffects.length)];
    weapon.className = `ninja-weapon ${randomType} ${randomWind}`;
    weapon.style.left = Math.random() * 100 + '%';
    weapon.style.animationDelay = '0s';
    weapon.style.animationDuration = (Math.random() * 10 + 8) + 's';
    document.body.appendChild(weapon);
    
    // Remove weapon after animation
    setTimeout(() => {
      if (weapon.parentNode) {
        weapon.parentNode.removeChild(weapon);
      }
    }, 14000);
  }

  // Start ninja weapons animation
  document.addEventListener('DOMContentLoaded', () => {
    createNinjaWeapons();
    
    // Create new weapons every 6 seconds
    setInterval(createNinjaWeapons, 6000);
    // Create random single weapons every 3 seconds
    setInterval(createRandomWeapon, 3000);
  });

  function getYesterdayLocalISODate() {
    const d = new Date();
    d.setDate(d.getDate() - 1);
    const year = d.getFullYear();
    const month = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
  }

  function formatCurrencyVND(number) {
    const rounded = Math.round(Number(number) || 0);
    return rounded.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.') + ' VND';
  }

  function normalizeAccountId(id) {
    const trimmed = (id || '').trim();
    if (!trimmed) return '';
    if (trimmed.startsWith('act_')) return trimmed;
    return `act_${trimmed}`;
  }

  async function fetchInsightsForAccount(accountId, accessToken, since, until) {
    const timeRange = encodeURIComponent(JSON.stringify({ since, until }));
    const fields = encodeURIComponent('campaign_name,spend');
    const level = 'campaign';
    const url = `https://graph.facebook.com/v18.0/${accountId}/insights?fields=${fields}&level=${level}&time_range=${timeRange}&limit=5000&access_token=${encodeURIComponent(accessToken)}`;

    const res = await fetch(url, { method: 'GET' });
    if (!res.ok) {
      const text = await res.text();
      throw new Error(`HTTP ${res.status} for ${accountId}: ${text}`);
    }
    return res.json();
  }

  function renderResults(nameToSpend) {
    const tableBody = document.querySelector('#results-table tbody');
    tableBody.innerHTML = '';

    // Sort by numeric order (1), (2), (3), etc.
    const entries = Array.from(nameToSpend.entries()).sort((a, b) => {
      // Extract number from beginning of name like "(1)", "(2)", etc.
      const getNumber = (name) => {
        const match = name.match(/^\((\d+)\)/);
        return match ? parseInt(match[1], 10) : 999999; // Put items without numbers at the end
      };
      return getNumber(a[0]) - getNumber(b[0]);
    });
    let totalSpend = 0;

    for (const [name, total] of entries) {
      totalSpend += total;
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${name}</td><td>${formatCurrencyVND(total)}</td>`;
      tableBody.appendChild(tr);
    }

    // Add total row
    const totalTr = document.createElement('tr');
    totalTr.innerHTML = `<td style="font-weight:600; color:#facc15;">Tổng cộng</td><td style="font-weight:600; color:#facc15;">${formatCurrencyVND(totalSpend)}</td>`;
    tableBody.appendChild(totalTr);

    document.getElementById('results').style.display = entries.length ? 'block' : 'none';
  }

  function setBusy(isBusy, message = '') {
    const statusEl = document.getElementById('status');
    statusEl.textContent = isBusy ? (message || 'Đang xử lý...') : '';
  }

  document.addEventListener('DOMContentLoaded', () => {
    const yesterday = getYesterdayLocalISODate();
    document.getElementById('since').value = yesterday;
    document.getElementById('until').value = yesterday;

    const form = document.getElementById('insights-form');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('errors');
      errorEl.style.display = 'none';
      document.getElementById('results').style.display = 'none';

      const accessToken = document.getElementById('access_token').value.trim();
      const idsRaw = document.getElementById('ad_account_ids').value;
      const since = (document.getElementById('since').value || yesterday).trim();
      const until = (document.getElementById('until').value || yesterday).trim();

      const accountIds = idsRaw.split(',').map(s => normalizeAccountId(s)).filter(Boolean);
      if (!accessToken || accountIds.length === 0) {
        errorEl.textContent = '🔥 Cần Access Token và ít nhất một Ninja Village ID để bắt đầu mission!';
        errorEl.style.display = 'block';
        return;
      }

      const nameToSpend = new Map();
      const errorLines = [];

      setBusy(true, '🔥 Đang thu thập chakra data từ các ninja villages...');

      for (const accountId of accountIds) {
        try {
          const data = await fetchInsightsForAccount(accountId, accessToken, since, until);
          const rows = Array.isArray(data && data.data) ? data.data : [];
          for (const row of rows) {
            const name = (row.campaign_name || 'Không có tên').trim().toLowerCase();
            const key = name.slice(0, 21);
            const spend = Number(row.spend || 0);
            nameToSpend.set(key, (nameToSpend.get(key) || 0) + spend);
          }
        } catch (err) {
          errorLines.push(String(err));
        }
      }

      setBusy(false);

      if (errorLines.length) {
        errorEl.textContent = errorLines.join('\n');
        errorEl.style.display = 'block';
      }

      renderResults(nameToSpend);
    });

    // Gửi dữ liệu sang Google Apps Script Web App
  document.getElementById('push-to-sheet').addEventListener('click', async () => {
    const gasUrl = (document.getElementById('gas_url').value || '').trim();
    const since = (document.getElementById('since').value || getYesterdayLocalISODate()).trim();
    const pushStatus = document.getElementById('push-status');

    const tbody = document.querySelector('#results-table tbody');
    const rows = Array.from(tbody.querySelectorAll('tr'))
      .map(tr => Array.from(tr.querySelectorAll('td')).map(td => td.textContent.trim()))
      .filter(cells => cells.length === 2 && cells[0] && cells[0] !== 'Tổng cộng');

    if (!gasUrl) { pushStatus.textContent = '🔥 Chưa nhập Ninja Scroll URL!'; return; }
    if (!rows.length) { pushStatus.textContent = '🔥 Không có chakra data để gửi!'; return; }

    // Chuyển VND hiển thị -> số, gửi theo format Ads của Apps Script: {type:'ads', date, rows:[{name,spend}]}
    const payload = {
      type: 'ads',
      date: since,
      rows: rows.map(([name, spend]) => ({
        name,
        spend: Number((spend || '0').replace(/[^0-9]/g, ''))
      }))
    };

    pushStatus.textContent = '🔥 Đang gửi chakra data đến ninja scroll...';

    // Ưu tiên gửi form-url-encoded (tránh preflight)
    const params = new URLSearchParams();
    params.set('type', payload.type);
    params.set('date', payload.date);
    params.set('rows', JSON.stringify(payload.rows));

    try {
      const res = await fetch(gasUrl, { method: 'POST', body: params });
      let data = {};
      try { data = await res.json(); } catch {}
      if (!res.ok) throw new Error((data && data.error) || `HTTP ${res.status}`);

      pushStatus.textContent = `✅ OK | updated=${data.updated ?? data.groupsUpdated ?? 0} | ${data.message || ''}`;
    } catch (err) {
      // Fallback no-cors nếu server không cho CORS
      try {
        await fetch(gasUrl, { method: 'POST', mode: 'no-cors', body: params });
        pushStatus.textContent = '🔥 Ninja scroll đã nhận được chakra data! Kiểm tra Google Sheet để xác nhận.';
      } catch (e2) {
        pushStatus.textContent = `❌ Lỗi gửi dữ liệu: ${String(err)}`;
      }
    }
  });
  });
  </script>
</body>
</html>
